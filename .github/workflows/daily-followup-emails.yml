name: Daily follow-up emails

on:
  schedule:
    # 10:00 AM Asia/Kolkata, Monday-Friday. GitHub cron is UTC.
    - cron: "30 4 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-followup-emails
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
      AGENTMAIL_API_KEY: ${{ secrets.AGENTMAIL_API_KEY }}
      AGENTMAIL_INBOX_ID: ${{ secrets.AGENTMAIL_INBOX_ID }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NOTIFY_FROM_EMAIL: ${{ secrets.NOTIFY_FROM_EMAIL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send daily follow-up emails
        run: npm run notify:daily
